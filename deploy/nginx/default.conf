client_max_body_size ${MAX_IMPORT_FILE_SIZE_MB}m;

upstream mvo_api {
    server api:3001;
}

upstream mvo_web {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://mvo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://mvo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
